name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cross --git https://github.com/cross-rs/cross
      - run: cross build --release --target ${{ matrix.target }}
      - run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cmdify-${{ matrix.target }}.tar.gz cmdify
      - uses: actions/upload-artifact@v4
        with:
          name: cmdify-${{ matrix.target }}
          path: cmdify-${{ matrix.target }}.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - run: |
          cd target/aarch64-apple-darwin/release
          tar czf ../../../cmdify-aarch64-apple-darwin.tar.gz cmdify
      - uses: actions/upload-artifact@v4
        with:
          name: cmdify-aarch64-apple-darwin
          path: cmdify-aarch64-apple-darwin.tar.gz
      - run: cargo build --release --target x86_64-apple-darwin
      - run: |
          cd target/x86_64-apple-darwin/release
          tar czf ../../../cmdify-x86_64-apple-darwin.tar.gz cmdify
      - uses: actions/upload-artifact@v4
        with:
          name: cmdify-x86_64-apple-darwin
          path: cmdify-x86_64-apple-darwin.tar.gz

  release:
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          cd artifacts
          sha256sum cmdify-*/cmdify-*.tar.gz > checksums-sha256.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/cmdify-*/cmdify-*.tar.gz
            artifacts/checksums-sha256.txt
          generate_release_notes: true
